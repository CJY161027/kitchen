<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!--
    智能点餐系统 - 厨师端界面
    ==============================
    本页面供厨房/厨师使用，用于接收和处理顾客订单。

    功能特点：
    1. 大字体显示 - 方便厨师远距离查看
    2. 声音提醒 - 新订单到达时自动播放提示音
    3. 显示订单编号和下单时间
    4. 一键操作 - 接单、取消、完成
    5. 实时刷新 - 自动轮询获取最新订单

    版本：v2.0
    -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2E4052">
    <title>厨房端 - 智能点餐系统</title>

    <style>
        /*
        CSS样式说明：
        ===========
        厨师端采用深色主题，大字体设计，方便厨房环境查看。
        颜色方案：
        - 主色调：#2E4052（深蓝灰，稳重专业）
        - 警告色：#FF6B35（橙色，用于待处理订单）
        - 进行中：#FFC107（黄色）
        - 完成色：#28A745（绿色）
        */

        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --card-bg: #0f3460;
            --accent: #e94560;
            --warning: #FF6B35;
            --processing: #FFC107;
            --success: #28A745;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ========== 头部导航 ========== */
        .header {
            background: linear-gradient(135deg, var(--secondary-bg), var(--card-bg));
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
        }

        .header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 .icon {
            font-size: 2.5rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .status-dot.connected {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-dot.disconnected {
            background-color: var(--accent);
        }

        .order-count {
            font-size: 1.2rem;
            background: var(--accent);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
        }

        /* ========== 主内容区域 ========== */
        .main-content {
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* ========== 订单卡片 ========== */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .order-card {
            background: linear-gradient(145deg, var(--card-bg), var(--secondary-bg));
            border-radius: var(--border-radius);
            padding: 25px;
            border-left: 6px solid var(--warning);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 订单状态边框颜色 */
        .order-card.pending {
            border-left-color: var(--warning);
        }

        .order-card.processing {
            border-left-color: var(--processing);
        }

        .order-card.completed {
            border-left-color: var(--success);
            opacity: 0.7;
        }

        /* ========== 订单头部 ========== */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .order-id {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--warning);
        }

        .order-time {
            font-size: 1.3rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .order-status {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .order-status.pending {
            background-color: var(--warning);
            color: white;
        }

        .order-status.processing {
            background-color: var(--processing);
            color: #333;
        }

        .order-status.completed {
            background-color: var(--success);
            color: white;
        }

        /* ========== 桌号信息 ========== */
        .table-info {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .table-label {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .table-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        /* ========== 菜品列表 ========== */
        .order-items {
            margin-bottom: 25px;
        }

        .items-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .item-name {
            font-weight: 600;
        }

        .item-quantity {
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }

        /* ========== 总价 ========== */
        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .total-label {
            color: var(--text-secondary);
        }

        .total-price {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--success);
        }

        /* ========== 操作按钮 ========== */
        .order-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 18px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-start {
            background: linear-gradient(135deg, var(--processing), #E6A800);
            color: #333;
        }

        .btn-complete {
            background: linear-gradient(135deg, var(--success), #1E7E34);
            color: white;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #666, #444);
            color: white;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 100px 50px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 8rem;
            margin-bottom: 30px;
        }

        .empty-state h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .empty-state p {
            font-size: 1.3rem;
        }

        /* ========== 完成订单区域 ========== */
        .completed-section {
            margin-top: 50px;
        }

        .completed-section .section-title {
            color: var(--success);
        }

        /* ========== 提示消息 ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 1.2rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--accent);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .orders-grid {
                grid-template-columns: 1fr;
            }

            .order-id {
                font-size: 1.4rem;
            }

            .table-number {
                font-size: 1.8rem;
            }

            .item-row {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- ========== 头部导航 ========== -->
    <header class="header">
        <h1>
            <span class="icon">👨‍🍳</span>
            厨房端 - 订单管理
        </h1>

        <div class="status-bar">
            <div class="connection-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
            <div class="order-count">
                待处理: <span id="pendingCount">0</span>
            </div>
        </div>
    </header>

    <!-- ========== 主内容区域 ========== -->
    <main class="main-content">
        <!-- 待处理订单 -->
        <section id="pendingSection">
            <h2 class="section-title">
                <span>⏳</span>
                待处理订单
            </h2>
            <div class="orders-grid" id="pendingOrders">
                <!-- 待处理订单卡片将动态生成 -->
            </div>
        </section>

        <!-- 进行中订单 -->
        <section id="processingSection" style="margin-top: 50px;">
            <h2 class="section-title">
                <span>🔥</span>
                制作中订单
            </h2>
            <div class="orders-grid" id="processingOrders">
                <!-- 制作中订单卡片将动态生成 -->
            </div>
        </section>

        <!-- 已完成订单 -->
        <section class="completed-section" id="completedSection">
            <h2 class="section-title">
                <span>✅</span>
                今日已完成订单
            </h2>
            <div class="orders-grid" id="completedOrders">
                <!-- 已完成订单卡片将动态生成 -->
            </div>
        </section>
    </main>

    <!-- ========== 提示消息 ========== -->
    <div class="toast" id="toast">提示消息</div>

    <!-- ========== 提示音效（使用Web Audio API生成） ========== -->
    <script>
        /*
        ===========================================================================
        声音提醒功能
        ===========================================================================
        使用Web Audio API生成提示音，无需外部音频文件。
        当收到新订单时自动播放。
        */

        // 创建音频上下文
        let audioContext = null;

        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.warn("浏览器不支持Web Audio API");
            }
        }

        // 播放提示音（蜂鸣声）
        function playNotificationSound() {
            if (!audioContext) {
                initAudio();
            }

            if (!audioContext) return;

            try {
                // 创建振荡器
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                // 设置音效参数
                oscillator.frequency.value = 800;  // 频率
                oscillator.type = 'sine';            // 正弦波

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

                // 播放
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);

                // 3秒后再响一次
                setTimeout(() => {
                    if (!audioContext) return;
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.frequency.value = 1000;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    osc2.start(audioContext.currentTime);
                    osc2.stop(audioContext.currentTime + 0.5);
                }, 300);

            } catch (e) {
                console.error("播放提示音失败：", e);
            }
        }

        /*
        ===========================================================================
        全局变量
        ===========================================================================
        */

        // API基础URL
        const API_BASE = window.location.origin.replace(':8000', ':8000');

        // 订单数据
        let orders = [];

        // 上一次更新的时间戳
        let lastUpdateTime = 0;

        // 轮询间隔（毫秒）
        const POLL_INTERVAL = 2000;

        // 上一次看到的待处理订单数量（用于检测新订单）
        let lastPendingCount = 0;

        /*
        ===========================================================================
        API通信函数
        ===========================================================================
        */

        async function apiGet(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`API GET ${endpoint} 失败：`, error);
                return null;
            }
        }

        async function apiPut(endpoint, params) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.error(`API PUT ${endpoint} 失败：`, error);
                return null;
            }
        }

        /*
        ===========================================================================
        订单操作函数
        ===========================================================================
        */

        // 接单（开始制作）
        async function startCooking(orderId) {
            const result = await apiPut(`/api/order/${orderId}/status`, { status: "制作中" });
            if (result && result.message === "状态更新成功") {
                showToast("已开始制作");
                loadOrders();
            } else {
                showToast("操作失败", "error");
            }
        }

        // 完成订单
        async function completeOrder(orderId) {
            const result = await apiPut(`/api/order/${orderId}/status`, { status: "已完成" });
            if (result && result.message === "状态更新成功") {
                showToast("订单已完成");
                loadOrders();
            } else {
                showToast("操作失败", "error");
            }
        }

        // 取消订单
        async function cancelOrder(orderId) {
            const result = await apiPut(`/api/order/${orderId}/status`, { status: "已取消" });
            if (result && result.message === "状态更新成功") {
                showToast("订单已取消");
                loadOrders();
            } else {
                showToast("操作失败", "error");
            }
        }

        /*
        ===========================================================================
        加载订单数据
        ===========================================================================
        */

        async function loadOrders() {
            const data = await apiGet('/api/orders');

            if (data && data.orders) {
                // 按状态分类
                const pending = data.orders.filter(o => o.status === "待处理");
                const processing = data.orders.filter(o => o.status === "制作中");
                const completed = data.orders.filter(o => o.status === "已完成" || o.status === "已取消");

                // 检查是否有新订单
                if (pending.length > lastPendingCount && lastPendingCount > 0) {
                    playNotificationSound();
                    showToast(`📢 新订单来了！共 ${pending.length} 个待处理`);
                }
                lastPendingCount = pending.length;

                // 更新待处理数量显示
                document.getElementById('pendingCount').textContent = pending.length;

                // 渲染订单
                renderOrders(pending, 'pendingOrders');
                renderOrders(processing, 'processingOrders');
                renderOrders(completed, 'completedOrders');

                // 更新连接状态
                updateConnectionStatus(true);
            }
        }

        /*
        ===========================================================================
        渲染订单
        ===========================================================================
        */

        function renderOrders(orderList, containerId) {
            const container = document.getElementById(containerId);

            if (orderList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>暂无订单</p>
                    </div>
                `;
                return;
            }

            // 按创建时间倒序排列
            const sortedOrders = [...orderList].sort((a, b) => {
                return new Date(b.create_time) - new Date(a.create_time);
            });

            container.innerHTML = sortedOrders.map(order => {
                // 生成状态样式类
                let statusClass = '';
                if (order.status === "待处理") statusClass = 'pending';
                else if (order.status === "制作中") statusClass = 'processing';
                else statusClass = 'completed';

                // 状态显示文本
                let statusText = '';
                if (order.status === "待处理") statusText = '⏳ 待处理';
                else if (order.status === "制作中") statusText = '🔥 制作中';
                else if (order.status === "已完成") statusText = '✅ 已完成';
                else statusText = '❌ 已取消';

                // 生成菜品列表HTML
                const itemsHtml = order.items.map(item => `
                    <div class="item-row">
                        <span class="item-name">${item.name}</span>
                        <span class="item-quantity">×${item.quantity}</span>
                    </div>
                `).join('');

                // 根据状态显示不同按钮
                let buttonsHtml = '';
                if (order.status === "待处理") {
                    buttonsHtml = `
                        <button class="btn btn-start" onclick="startCooking('${order.order_id}')">
                            🔥 开始制作
                        </button>
                        <button class="btn btn-cancel" onclick="cancelOrder('${order.order_id}')">
                            ❌ 取消
                        </button>
                    `;
                } else if (order.status === "制作中") {
                    buttonsHtml = `
                        <button class="btn btn-complete" onclick="completeOrder('${order.order_id}')">
                            ✅ 完成出餐
                        </button>
                    `;
                } else {
                    buttonsHtml = `
                        <button class="btn btn-cancel" onclick="cancelOrder('${order.order_id}')" disabled>
                            已处理
                        </button>
                    `;
                }

                return `
                <div class="order-card ${statusClass}">
                    <div class="order-header">
                        <div class="order-info">
                            <div class="order-id">#${order.order_id}</div>
                            <div class="order-time">
                                <span>🕐</span>
                                <span>${order.create_time}</span>
                            </div>
                        </div>
                        <div class="order-status ${statusClass}">${statusText}</div>
                    </div>

                    <div class="table-info">
                        <div class="table-label">桌号</div>
                        <div class="table-number">${order.table_id}</div>
                    </div>

                    <div class="order-items">
                        <div class="items-title">📝 订单内容</div>
                        ${itemsHtml}
                    </div>

                    <div class="order-total">
                        <span class="total-label">💰 合计</span>
                        <span class="total-price">¥${order.total_price}</span>
                    </div>

                    <div class="order-actions">
                        ${buttonsHtml}
                    </div>
                </div>
                `;
            }).join('');
        }

        /*
        ===========================================================================
        轮询机制
        ===========================================================================
        */

        let pollTimer = null;

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(loadOrders, POLL_INTERVAL);
            console.log(`轮询已启动，间隔：${POLL_INTERVAL}ms`);
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        /*
        ===========================================================================
        UI辅助函数
        ===========================================================================
        */

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (connected) {
                dot.classList.add('connected');
                dot.classList.remove('disconnected');
                text.textContent = '已连接';
            } else {
                dot.classList.remove('connected');
                dot.classList.add('disconnected');
                text.textContent = '连接断开';
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        /*
        ===========================================================================
        页面生命周期
        ===========================================================================
        */

        document.addEventListener('DOMContentLoaded', function() {
            // 初始化音频（需要在用户交互后才能播放）
            document.body.addEventListener('click', function initAudioOnClick() {
                initAudio();
                document.body.removeEventListener('click', initAudioOnClick);
            }, { once: true });

            // 加载订单
            loadOrders();

            // 启动轮询
            startPolling();

            console.log('厨房端初始化完成');
        });

        window.addEventListener('beforeunload', function() {
            stopPolling();
        });
    </script>
</body>
</html>
